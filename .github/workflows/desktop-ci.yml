name: Desktop CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

concurrency:
  group: desktop-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/*.sh; do
            bash -n "$script"
            echo "OK: $script"
          done
      - name: Validate workflow YAML
        run: |
          python3 -c "
          import yaml, pathlib
          for path in pathlib.Path('.github/workflows').glob('*.yml'):
              yaml.safe_load(path.read_text())
              print(f'OK: {path}')
          "

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: services/ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -q

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo check
        run: cargo check
      - name: cargo test
        run: cargo test --lib

  front:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: front/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn test:unit

  lint-i18n:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: front/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn lint:i18n

  sidecar-packaging:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    # PyInstaller build is slow (~3 min) : run on main/develop pushes only, not on every PR.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - name: Build Python sidecar
        shell: bash
        env:
          CI: 'true'
        run: bash scripts/build-sidecar.sh
      - name: Smoke test sidecar binary
        shell: bash
        run: bash scripts/smoke-test-sidecar.sh
