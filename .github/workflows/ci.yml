name: CI

on:
  push:
    branches: [feature/update-package, develop]
  pull_request:
    branches: [develop, feature/update-package]

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_admin
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: glutamat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_TYPE: postgres
      DB_USERNAME: test_admin
      DB_PASSWORD: test_password
      DB_NAME: glutamat
      DB_HOST: localhost
      DB_PORT: 5432
      JWT_SECRET: test-jwt-secret-key-for-ci-only
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: api/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test
      - run: yarn test:e2e

  front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
          cache-dependency-path: front/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test
