name: workproba

networks:
  workproba-api-dev-network:
    name: workproba-api-dev-network

volumes:
  workproba-api-dev-db:

# include:
#  - ./additionals/pandoc.yml
#  - ./additionals/html2pdf.yml
#  - ./additionals/weaviate.yml

services:
  workproba-api-dev-db:
    platform: linux/x86_64 # For MacOS
    container_name: workproba-api-dev-db
    image: workproba-api-dev-db
    networks:
      - workproba-api-dev-network
    build:
      context: '../'
      dockerfile: ./docker/Dockerfile.db
    restart: 'unless-stopped'
    ports:
      - '${BACKEND_DOCKER_PSQL_PORT_EXPOSED:-5052}:5432'
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/data/postgres
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - workproba-api-dev-db:/data/postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
  workproba-api-dev:
    platform: linux/x86_64 # For MacOS
    container_name: workproba-api-dev
    image: workproba-api-dev
    depends_on:
      workproba-api-dev-db:
        condition: service_healthy
    networks:
      - workproba-api-dev-network
    restart: 'unless-stopped'
    build:
      context: './../'
      dockerfile: ./docker/Dockerfile.dev
    environment:
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLCERT=${DB_SSLCERT}
      - DB_HOST=${DB_HOST:-workproba-api-dev-db} # name of the psql service
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - DOCKER_DEV=${DOCKER_DEV:-false}
    volumes:
      - ./../:/app/
    ports:
      - '${BACKEND_DOCKER_APP_PORT_EXPOSED:-5051}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    command: bash -c "if [ \"${DOCKER_DEV}\" = \"true\" ]; then tail -f /dev/null; else yarn install && yarn run migration:up && yarn run start:dev; fi"
