name: workproba

networks:
  workproba-api-network:

volumes:
  workproba-api-db:

include:
#  - ./additionals/pandoc.yml
#  - ./additionals/html2pdf.yml
#  - ./additionals/weaviate.yml

services:
  workproba-api:
    container_name: workproba-api
    image: workproba-api:latest
    depends_on:
      workproba-api-db:
        condition: service_healthy
    networks:
      - workproba-api-network
    restart: 'unless-stopped'
    build:
      context: '../'
      dockerfile: ./docker/Dockerfile
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=${DB_HOST:-workproba-api-db} # name of the psql service
      - DB_PORT=${DB_PORT}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./../.env:/app-prod/.env
      - ./../uploads:/uploads
    ports:
      - '${BACKEND_DOCKER_APP_PORT_EXPOSED:-5051}:3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    # If starting on kubernetes, this is not required
    # Required if runing on classical docker-compose
    #command: bash -c 'while !</dev/tcp/api-psql/5432; do sleep 1; done; yarn run migration:up && yarn run start:prod'

  workproba-api-db:
    platform: linux/x86_64 # For MacOS
    container_name: workproba-api-db
    image: workproba-api-db
    networks:
      - workproba-api-network
    build:
      context: '../'
      dockerfile: ./docker/Dockerfile.db
    restart: 'unless-stopped'
    ports:
      - '${BACKEND_DOCKER_PSQL_PORT_EXPOSED:-5052}:5432'
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - PGDATA=/data/postgres
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - workproba-api-db:/data/postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5
